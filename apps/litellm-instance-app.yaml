apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm-instance
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: litellm
  source:
    repoURL: https://github.com/YOUR_ORG/litellm-gitops.git
    targetRevision: master
    path: litellm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true