apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm-operator
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: litellm
  source:
    repoURL: ghcr.io/bbdsoftware/charts
    chart: litellm-operator
    targetRevision: 1.1.2
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true